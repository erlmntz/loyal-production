<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyal Production – Book Now</title>
    <link rel="icon" type="image/png" href="images/LP_logo.jpg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/booking.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>

    <header>
        <img src="images/LP_logonobg.png" alt="Loyal Production Logo" width="200">
        <span>Loyal Production</span>
    </header>

    <section class="booking-section">
        <div class="container">
            <h1 class="section-title">Book Your Event</h1>
            <p class="section-subtitle">Tell us about your special occasion and we’ll get back to you within 24 hours.</p>

            <div class="booking-form-container">
                <form id="booking-form">
                    <!-- Event Type -->
                    <div class="form-group">
                        <label for="event-type">Event Type *</label>
                        <select id="event-type" name="eventType" required>
                            <option value="" disabled selected>Select an option</option>
                            <option value="wedding">Wedding</option>
                            <option value="debut">Debut</option>
                            <option value="birthday">Birthday</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <!-- Event Date -->
                    <div class="form-group">
                        <label for="event-date">Preferred Event Date *</label>
                        <input type="text" id="event-date" name="eventDate" placeholder="Select a date" required readonly>
                    </div>

                    <!-- Name -->
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" placeholder="+63 912 345 6789" required>
                    </div>

                    <!-- Message -->
                    <div class="form-group">
                        <label for="message">Additional Details</label>
                        <textarea id="message" name="message" rows="4" placeholder="Tell us more about your event..."></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary submit-btn">Send Booking Request</button>
                </form>
                <div id="form-feedback" class="form-feedback"></div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Loyal Production. All rights reserved.</p>
    </footer>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <!-- Custom booking script -->
    <script src="js/booking.js"></script>
</body>
</html>
