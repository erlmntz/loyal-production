<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyal Production – Book Now</title>
    <link rel="icon" type="image/png" href="images/LP_logo.jpg">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/booking.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <header>
        <img src="images/LP_logonobg.png" alt="Loyal Production Logo" width="200">
        <span>Loyal Production</span>
    </header>

    <section class="booking-section">
        <div class="container">
            <div class="booking-form-container">
                <form id="booking-form">
                    

                    <!-- Event type -->
                    <div class="form-group">
                        <label for="event-type">Event Type *</label>
                        <select id="event-type" name="eventType" required>
                            <option value="" disabled selected>Select an option</option>
                            <option value="wedding">Wedding</option>
                            <option value="debut">Debut</option>
                            <option value="birthday">Birthday</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <!-- Event date -->
                    <div class="form-group">
                        <label for="event-date">Preferred Event Date *</label>
                        <input type="text" id="event-date" name="eventDate" placeholder="Select a date" required readonly>
                    </div>

                    <!-- Service type -->
                    <fieldset class="form-group radio-group">
                        <legend>Services Interested In *</legend>
                        <div class="radio-options">
                            <label class="radio-label">
                                <input type="checkbox" name="serviceType[]" value="SDE" required> SDE (Same Day Edit)
                            </label>
                            <label class="radio-label">
                                <input type="checkbox" name="serviceType[]" value="Video Highlight"> Video Highlight
                            </label>
                            <label class="radio-label">
                                <input type="checkbox" name="serviceType[]" value="Photography"> Photography Only
                            </label>
                            <label class="radio-label">
                                <input type="checkbox" name="serviceType[]" value="Videography"> Videography Only
                            </label>
                        </div>
                        <small style="display: block; margin-top: 5px; color: #666;">You can select multiple options.</small>
                    </fieldset>

                    <!-- Full name -->
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                    </div>

                    <!-- Additional details -->
                    <div class="form-group">
                        <label for="message">Additional Details</label>
                        <textarea id="message" name="message" rows="4" placeholder="Tell us more about your event..."></textarea>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary submit-btn">Send Booking Request</button>
                </form>
                <div id="form-feedback" class="form-feedback"></div>
            </div>
        </div>
    </section>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <!-- Custom script -->
    <script src="js/booking.js"></script>
</body>
</html>
