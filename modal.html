<!-- Modal for Availability Calendar -->
    <div id="availability-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Check Availability</h2>
            <p>Select a date to see if we're available for your event.</p>
            
            <!-- Legend for quick reference -->
            <div class="availability-legend">
                <div class="legend-item">
                    <span class="legend-color available-color"></span>
                    <span>Available</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color booked-color"></span>
                    <span>Booked</span>
                </div>
            </div>

            <div id="calendar-container"></div>
            <p id="availability-message"></p>
        </div>
    </div>
