<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Check Availability · Loyal Production</title>
  <link rel="icon" type="image/png" href="images/LP_logo.jpg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&family=Playfair+Display:wght@400..900&family=Roboto:wght@100..900&display=swap" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- AOS CSS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/check-availability.css">
</head>
<body>

<header>
  <a href="index.html">
    <img src="images/LP_logonobg.png" alt="Loyal Production Logo" width="200">
  </a>
  <h1>Loyal Production</h1>
</header>

<main class="availability-page">
  <div class="main-wrapper">

    <!-- HEADER -->
    <div class="page-header" data-aos="fade-down">
      <h1>Check Availability</h1>
      <p>Select a date to see if we're available</p>
    </div>

    <div class="content-grid">

      <!-- LEFT - FULL MONTH CALENDAR -->
      <div class="calendar-section" data-aos="fade-right">
        <div class="card">
          <h2><i class="bi bi-grid-3x3-gap-fill"></i> Full month view</h2>
          <div id="customCalendar" class="calendar-wrapper">
            <div class="calendar-header">
              <h3 id="displayMonthYear">March 2026</h3>
              <div class="month-nav">
                <button id="prevMonthBtn"><i class="bi bi-chevron-left"></i></button>
                <button id="nextMonthBtn"><i class="bi bi-chevron-right"></i></button>
              </div>
            </div>
            <div class="calendar-weekdays">
              <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
            </div>
            <div id="calendarDaysGrid" class="calendar-days"></div>
          </div>
          <div class="legend">
            <div class="legend-item"><span class="legend-dot dot-available"></span><span>Available</span></div>
            <div class="legend-item"><span class="legend-dot dot-booked"></span><span>Booked</span></div>
            <div class="legend-item"><span class="legend-dot dot-today"></span><span>Today</span></div>
          </div>
        </div>
      </div>

      <!-- RIGHT - SEARCH, STATUS, LIST -->
      <div class="status-section" data-aos="fade-left">

        <div class="card">
          <h2><i class="bi bi-search"></i> Search Date</h2>
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="YYYY-MM-DD" inputmode="numeric">
            <button id="searchBtn" class="search-btn"><i class="bi bi-arrow-right"></i></button>
          </div>
        </div>

        <div class="card">
          <div class="status-header"><i class="bi bi-info-circle"></i><h2>Date Status</h2></div>
          <div id="result" class="result-area">
            <div class="placeholder"><i class="bi bi-calendar2-week"></i><p>Select a date</p></div>
          </div>
          <div class="actions">
            <button class="action-btn" id="todayBtn"><i class="bi bi-sun"></i> Today</button>
            <button class="action-btn" id="tomorrowBtn"><i class="bi bi-sunrise"></i> Tomorrow</button>
            <button class="action-btn" id="clearBtn"><i class="bi bi-eraser"></i> Clear</button>
          </div>
        </div>

        <div class="card">
          <h2><i class="bi bi-list-check"></i> Booked Dates</h2>
          <div id="bookedList" class="dates-list">
            <div class="loading"><i class="bi bi-arrow-repeat spinning"></i> Loading booked dates...</div>
          </div>
        </div>
      </div>
    </div>

    <div class="back-section">
      <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Back to Home</a>
    </div>

  </div>
</main>

<footer>
  <p>&copy; 2026 Loyal Production. All rights reserved.</p>
</footer>

<!-- Scripts -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/lib/supabase-client.js"></script>
<script src="js/lib/date-utils.js"></script>
<script src="js/user/check-availability.js"></script>
</body>
</html>
